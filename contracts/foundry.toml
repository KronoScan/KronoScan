[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.30"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC}"

[etherscan]
arc_testnet = { key = "${ETHERSCAN_API_KEY}", url = "${ARCSCAN_API_URL}" }
